name: Keep App Awake

on:
  schedule:
    - cron: '10 */10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keep-awake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Make a trivial change
        run: |
          echo "Last kept alive on $(date)" > .github/keep-awake-timestamp.txt

      - name: Commit and push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/keep-awake-timestamp.txt
          git diff --staged --quiet || git commit -m "chore: keep awake"
          git push
